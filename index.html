<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberDog Companion</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <!-- 3D Canvas Container -->
    <div id="app"></div>
    
    <!-- Speech Bubble Container -->
    <div id="speech-container" class="hidden">
      <div id="speech-bubble" class="hidden">
        <button id="speech-close" onclick="document.getElementById('speech-container').classList.add('hidden'); document.getElementById('speech-bubble').classList.add('hidden');">✕</button>
        <span id="speech-text"></span>
      </div>
    </div>

    <!-- Resize handle removed -> static size -->

    <script type="module" src="/src/renderer.js"></script>
    <script type="module" src="/src/interactions/ActionMenu.js"></script>
  </body>
</html>
